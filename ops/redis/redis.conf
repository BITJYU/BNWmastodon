# Mastodon Whippy Edition Redis baseline.
# Queue durability is prioritized over cache eviction because this Redis also backs Sidekiq.

bind 0.0.0.0
protected-mode no
port 6379
timeout 0
tcp-keepalive 60

dir /data

# Persistence
appendonly yes
appendfilename "appendonly.aof"
appenddirname "appendonlydir"
appendfsync everysec
no-appendfsync-on-rewrite no
aof-use-rdb-preamble yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
save ""

# Memory policy
# Keep enough headroom for the OS and PostgreSQL page cache.
# For a small single-node Mastodon host, start around 1GB and raise after observing peak usage.
maxmemory 1gb
maxmemory-policy noeviction

# Performance
databases 16
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
io-threads 2
io-threads-do-reads yes
