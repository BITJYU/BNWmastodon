worker_processes auto;
pid /run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  reset_timedout_connection on;
  server_tokens off;
  types_hash_max_size 4096;

  client_max_body_size 100m;
  client_body_timeout 30s;
  client_header_timeout 15s;
  send_timeout 30s;

  log_format mastodon '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time ua="$upstream_addr" '
                      'us="$upstream_status" urt="$upstream_response_time"';

  access_log /var/log/nginx/mastodon.access.log mastodon;
  error_log  /var/log/nginx/mastodon.error.log warn;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream mastodon_backend {
    least_conn;
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    # Step 6 scaling example:
    # server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream mastodon_streaming {
    least_conn;
    server 127.0.0.1:4000 max_fails=3 fail_timeout=30s;
    # Step 6 scaling example:
    # server 127.0.0.1:4001 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:4002 max_fails=3 fail_timeout=30s;
    keepalive 64;
  }

  proxy_cache_path /var/cache/nginx/mastodon levels=1:2
                   keys_zone=mastodon_cache:100m
                   inactive=60m
                   max_size=2g;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml;

  # Enable if nginx is built with ngx_brotli.
  # brotli on;
  # brotli_comp_level 5;
  # brotli_static on;
  # brotli_types
  #   text/plain
  #   text/css
  #   text/xml
  #   application/json
  #   application/javascript
  #   application/xml
  #   application/xml+rss
  #   image/svg+xml;

  server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location /health {
      proxy_pass http://mastodon_backend/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto http;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy same-origin always;

    location = /health {
      proxy_pass http://mastodon_backend/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      access_log off;
    }

    location ^~ /api/v1/streaming {
      proxy_pass http://mastodon_streaming;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Proxy "";

      proxy_buffering off;
      proxy_request_buffering off;
      proxy_connect_timeout 5s;
      proxy_send_timeout 3600s;
      proxy_read_timeout 3600s;
    }

    location ~ ^/(assets|packs|system|avatars|headers|emoji|sounds|sw\.js) {
      proxy_pass http://mastodon_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Proxy "";

      proxy_cache mastodon_cache;
      proxy_cache_lock on;
      proxy_cache_revalidate on;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_valid 200 301 302 10m;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
      add_header X-Cache $upstream_cache_status always;
    }

    location / {
      proxy_pass http://mastodon_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Connection "";
      proxy_set_header Proxy "";

      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      proxy_buffering on;
      proxy_request_buffering on;
    }
  }
}
