x-mastodon-app: &mastodon-app
  build: .
  image: bnw-mastodon:4.3.1
  restart: always
  env_file: .env.production
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  environment:
    RAILS_ENV: production
    NODE_ENV: production
    DB_HOST: db
    DB_PORT: 5432
    REDIS_HOST: redis
    REDIS_PORT: 6379
    REDIS_DB: 0
    CACHE_REDIS_HOST: redis
    CACHE_REDIS_PORT: 6379
    CACHE_REDIS_DB: 1
    SIDEKIQ_REDIS_HOST: redis
    SIDEKIQ_REDIS_PORT: 6379
    SIDEKIQ_REDIS_DB: 2
  networks:
    - internal_network

services:
  db:
    restart: always
    image: postgres:14-alpine
    shm_size: 1gb
    env_file: .env.production
    entrypoint:
      - /bin/sh
      - -ec
      - |
        export POSTGRES_USER="$${DB_USER:-mastodon}"
        export POSTGRES_DB="$${DB_NAME:-mastodon_production}"
        export POSTGRES_PASSWORD="$${DB_PASS:?DB_PASS must be set in .env.production}"
        exec docker-entrypoint.sh postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - internal_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${DB_USER:-mastodon}" -d "$${DB_NAME:-mastodon_production}" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./postgres14:/var/lib/postgresql/data
      - ./ops/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro

  redis:
    restart: always
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - internal_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./redis:/data
      - ./ops/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro

