  web:
    <<: *mastodon-app
    command: bundle exec puma -C config/puma.rb
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      BIND: 0.0.0.0
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CACHE_REDIS_HOST: redis
      CACHE_REDIS_PORT: 6379
      CACHE_REDIS_DB: 1
      SIDEKIQ_REDIS_HOST: redis
      SIDEKIQ_REDIS_PORT: 6379
      SIDEKIQ_REDIS_DB: 2
      MAX_THREADS: 8
      WEB_CONCURRENCY: 2
      DB_POOL: 8
    networks:
      - external_network
      - internal_network
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider --proxy=off localhost:3000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - ./public/system:/mastodon/public/system
      - ./public/assets:/mastodon/public/assets
      - ./public/avatars:/mastodon/public/avatars
      - ./public/headers:/mastodon/public/headers

  streaming:
    <<: *mastodon-app
    command: node ./streaming
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      BIND: 0.0.0.0
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CACHE_REDIS_HOST: redis
      CACHE_REDIS_PORT: 6379
      CACHE_REDIS_DB: 1
      SIDEKIQ_REDIS_HOST: redis
      SIDEKIQ_REDIS_PORT: 6379
      SIDEKIQ_REDIS_DB: 2
    networks:
      - external_network
      - internal_network
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider --proxy=off localhost:4000/api/v1/streaming/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - '127.0.0.1:4000:4000'

  sidekiq-default:
    <<: *mastodon-app
    command: bundle exec sidekiq -q default,12 -q mailers,2 -q ingress,1
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CACHE_REDIS_HOST: redis
      CACHE_REDIS_PORT: 6379
      CACHE_REDIS_DB: 1
      SIDEKIQ_REDIS_HOST: redis
      SIDEKIQ_REDIS_PORT: 6379
      SIDEKIQ_REDIS_DB: 2
      SIDEKIQ_CONCURRENCY: 16
      DB_POOL: 16
    volumes:
      - ./public/system:/mastodon/public/system
    healthcheck:
      test: ['CMD-SHELL', "pgrep -f \"sidekiq .* -q default,12 .* -q mailers,2 .* -q ingress,1\" >/dev/null || false"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  sidekiq-push:
    <<: *mastodon-app
    command: bundle exec sidekiq -q push,6
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CACHE_REDIS_HOST: redis
      CACHE_REDIS_PORT: 6379
      CACHE_REDIS_DB: 1
      SIDEKIQ_REDIS_HOST: redis
      SIDEKIQ_REDIS_PORT: 6379
      SIDEKIQ_REDIS_DB: 2
      SIDEKIQ_CONCURRENCY: 6
      DB_POOL: 6
    volumes:
      - ./public/system:/mastodon/public/system
    healthcheck:
      test: ['CMD-SHELL', "pgrep -f \"sidekiq .* -q push,6\" >/dev/null || false"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  sidekiq-pull:
    <<: *mastodon-app
    command: bundle exec sidekiq -q pull
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CACHE_REDIS_HOST: redis
      CACHE_REDIS_PORT: 6379
      CACHE_REDIS_DB: 1
      SIDEKIQ_REDIS_HOST: redis
      SIDEKIQ_REDIS_PORT: 6379
      SIDEKIQ_REDIS_DB: 2
      SIDEKIQ_CONCURRENCY: 4
      DB_POOL: 4
    volumes:
      - ./public/system:/mastodon/public/system
    healthcheck:
      test: ['CMD-SHELL', "pgrep -f \"sidekiq .* -q pull\" >/dev/null || false"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  sidekiq-scheduler:
    <<: *mastodon-app
    command: bundle exec sidekiq -q scheduler
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CACHE_REDIS_HOST: redis
      CACHE_REDIS_PORT: 6379
      CACHE_REDIS_DB: 1
      SIDEKIQ_REDIS_HOST: redis
      SIDEKIQ_REDIS_PORT: 6379
      SIDEKIQ_REDIS_DB: 2
      SIDEKIQ_CONCURRENCY: 2
      DB_POOL: 2
    volumes:
      - ./public/system:/mastodon/public/system
    healthcheck:
      test: ['CMD-SHELL', "pgrep -f \"sidekiq .* -q scheduler\" >/dev/null || false"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  external_network:
  internal_network:
    internal: true
